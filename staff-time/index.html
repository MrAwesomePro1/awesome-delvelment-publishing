<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Awesome StaffTime | Awesome Delvelment</title>
  <meta name="description" content="A staff video call room for Awesome Delvelment.">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="call-shell">
    <header class="call-topbar" aria-label="Awesome StaffTime">
      <a class="brand" href="../index.html" aria-label="Back to Awesome Delvelment launcher">
        <span class="brand-mark">AD</span>
        <span>
          <strong>Awesome StaffTime</strong>
          <small>Awesome Delvelment Staff</small>
        </span>
      </a>

      <div class="meeting-title">
        <p>Staff Standup</p>
        <h1>Awesome StaffTime</h1>
      </div>

      <div class="topbar-actions">
        <div class="status-pill" aria-live="polite">
          <span class="status-light"></span>
          <span id="call-status">Live</span>
          <span id="call-clock">--:--</span>
        </div>
        <button class="icon-button" id="invite-button" type="button" aria-label="Copy invite" title="Copy invite">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M19 8v6"></path>
            <path d="M22 11h-6"></path>
          </svg>
          <span class="tooltip">Copy invite</span>
        </button>
      </div>
    </header>

    <main class="call-layout">
      <section class="stage" aria-label="Staff video call">
        <div class="stage-header">
          <div>
            <p class="kicker">Team call</p>
            <h2 id="stage-heading">Staff Standup</h2>
          </div>
          <div class="layout-switch" aria-label="Layout">
            <button class="is-active" type="button" data-layout="grid">Grid</button>
            <button type="button" data-layout="focus">Focus</button>
          </div>
        </div>

        <section class="video-grid" id="video-grid" aria-live="polite"></section>

        <section class="shared-strip" aria-label="Shared projects">
          <article class="project-share">
            <img src="../../AWESOMECRAFT/icon-512.png" alt="">
            <div>
              <strong>AwesomeCraft</strong>
              <span>Build check</span>
            </div>
          </article>
          <article class="project-share">
            <img src="../../Viders/viders-icon-512.png" alt="">
            <div>
              <strong>Viders</strong>
              <span>Video review</span>
            </div>
          </article>
          <article class="project-share">
            <img src="../../New%20project/icon-512.png" alt="">
            <div>
              <strong>AI Council</strong>
              <span>Tool notes</span>
            </div>
          </article>
        </section>
      </section>

      <aside class="side-panel" aria-label="Call details">
        <div class="panel-tabs" role="tablist" aria-label="Details">
          <button class="is-active" id="tab-staff" type="button" role="tab" aria-controls="staff-panel" aria-selected="true" data-panel="staff">Staff</button>
          <button id="tab-chat" type="button" role="tab" aria-controls="chat-panel" aria-selected="false" data-panel="chat">Chat</button>
          <button id="tab-agenda" type="button" role="tab" aria-controls="agenda-panel" aria-selected="false" data-panel="agenda">Agenda</button>
        </div>

        <section class="panel-view is-active" id="staff-panel" role="tabpanel" aria-labelledby="tab-staff">
          <div class="call-stats">
            <div>
              <span id="staff-count">0</span>
              <small>Staff</small>
            </div>
            <div>
              <span id="muted-count">0</span>
              <small>Muted</small>
            </div>
            <div>
              <span id="duration-count">00:00</span>
              <small>Time</small>
            </div>
          </div>
          <div class="staff-list" id="staff-list"></div>
        </section>

        <section class="panel-view" id="chat-panel" role="tabpanel" aria-labelledby="tab-chat" hidden>
          <div class="chat-list" id="chat-list" aria-live="polite"></div>
          <form class="chat-composer" id="chat-form">
            <label class="sr-only" for="chat-input">Message staff</label>
            <input id="chat-input" type="text" autocomplete="off" placeholder="Message staff">
            <button class="icon-button send" type="submit" aria-label="Send message" title="Send message">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M22 2 11 13"></path>
                <path d="m22 2-7 20-4-9-9-4 20-7Z"></path>
              </svg>
            </button>
          </form>
        </section>

        <section class="panel-view" id="agenda-panel" role="tabpanel" aria-labelledby="tab-agenda" hidden>
          <div class="agenda-list" id="agenda-list"></div>
        </section>
      </aside>
    </main>

    <nav class="control-dock" aria-label="Call controls">
      <button class="dock-button" id="mic-button" type="button" aria-label="Mute microphone" aria-pressed="false" title="Microphone">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
          <path d="M12 19v3"></path>
        </svg>
        <span class="tooltip">Microphone</span>
      </button>
      <button class="dock-button" id="camera-button" type="button" aria-label="Turn camera off" aria-pressed="false" title="Camera">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="m22 8-6 4 6 4V8Z"></path>
          <rect x="2" y="6" width="14" height="12" rx="2"></rect>
        </svg>
        <span class="tooltip">Camera</span>
      </button>
      <button class="dock-button" id="share-button" type="button" aria-label="Share screen" aria-pressed="false" title="Share screen">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <rect x="3" y="4" width="18" height="13" rx="2"></rect>
          <path d="M8 21h8"></path>
          <path d="M12 17v4"></path>
          <path d="m8 10 4-4 4 4"></path>
          <path d="M12 6v8"></path>
        </svg>
        <span class="tooltip">Share screen</span>
      </button>
      <button class="dock-button" id="record-button" type="button" aria-label="Record call" aria-pressed="false" title="Record">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="9"></circle>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
        <span class="tooltip">Record</span>
      </button>
      <button class="dock-button" id="hand-button" type="button" aria-label="Raise hand" aria-pressed="false" title="Raise hand">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M18 11V7a2 2 0 1 0-4 0v4"></path>
          <path d="M14 10V5a2 2 0 1 0-4 0v8"></path>
          <path d="M10 12V8a2 2 0 1 0-4 0v7a6 6 0 0 0 12 0v-4"></path>
        </svg>
        <span class="tooltip">Raise hand</span>
      </button>
      <button class="dock-button" id="reaction-button" type="button" aria-label="Send reaction" title="React">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
          <path d="M9 9h.01"></path>
          <path d="M15 9h.01"></path>
        </svg>
        <span class="tooltip">React</span>
      </button>
      <button class="dock-button danger" id="leave-button" type="button" aria-label="Leave call" title="Leave call">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.12.88.32 1.73.6 2.55a2 2 0 0 1-.45 2.11L8 9.64a16 16 0 0 0 6.36 6.36l1.26-1.26a2 2 0 0 1 2.11-.45c.82.28 1.67.48 2.55.6A2 2 0 0 1 22 16.92Z"></path>
        </svg>
        <span class="tooltip">Leave call</span>
      </button>
    </nav>

    <div class="ended-overlay" id="ended-overlay" hidden>
      <div class="ended-panel">
        <span class="ended-mark">AD</span>
        <h2>Call ended</h2>
        <p id="ended-summary">Awesome StaffTime is ready when staff need it again.</p>
        <div class="ended-actions">
          <button class="primary-button" id="rejoin-button" type="button">Rejoin</button>
          <a class="secondary-button" href="../index.html">Launcher</a>
        </div>
      </div>
    </div>

    <div class="reaction-pop" id="reaction-pop" aria-live="polite"></div>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
