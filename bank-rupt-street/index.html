<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bank Rupt Street</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <div class="brandmark" aria-hidden="true">
            <svg viewBox="0 0 64 64" role="img">
              <rect x="8" y="24" width="48" height="30" rx="4"></rect>
              <path d="M14 24 32 10l18 14"></path>
              <path d="M18 32h28M18 42h28M24 32v18M40 32v18"></path>
              <path d="M45 12h7l-3 6 5 4h-8"></path>
            </svg>
          </div>
          <div>
            <h1>Bank Rupt Street</h1>
            <div id="gameStatus" class="game-status">Ready</div>
          </div>
        </div>
        <div class="top-actions">
          <a class="tool-link ghost" href="print-kit.html" title="Print board game kit">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6 9V3h12v6"></path>
              <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
              <path d="M6 14h12v7H6z"></path>
            </svg>
            <span>Print</span>
          </a>
          <button id="resetBtn" class="icon-button ghost" type="button" title="New game">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 12a9 9 0 1 0 3-6.7"></path>
              <path d="M3 3v6h6"></path>
            </svg>
            <span>New</span>
          </button>
        </div>
      </header>

      <main class="game-layout">
        <section class="board-zone" aria-label="Game board">
          <div id="board" class="board">
            <div class="board-center">
              <div class="center-skyline" aria-hidden="true">
                <svg viewBox="0 0 260 120">
                  <rect x="15" y="46" width="34" height="62" rx="4"></rect>
                  <rect x="56" y="28" width="42" height="80" rx="5"></rect>
                  <rect x="106" y="52" width="31" height="56" rx="4"></rect>
                  <rect x="145" y="18" width="48" height="90" rx="5"></rect>
                  <rect x="202" y="42" width="38" height="66" rx="4"></rect>
                  <path d="M18 108h224"></path>
                  <path d="M70 42h14M70 58h14M70 74h14M160 34h18M160 52h18M160 70h18M216 58h12M216 74h12"></path>
                  <circle cx="214" cy="28" r="11"></circle>
                  <path d="m209 28 4 4 8-9"></path>
                </svg>
              </div>
              <div class="dice-stage">
                <div id="diceReadout" class="dice-readout" aria-live="polite">
                  <span class="die">-</span>
                  <span class="die">-</span>
                </div>
                <div id="turnBadge" class="turn-badge">Start a game</div>
              </div>
              <div class="action-grid" aria-label="Turn controls">
                <button id="rollBtn" class="primary" type="button">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="4" y="4" width="16" height="16" rx="4"></rect>
                    <circle cx="9" cy="9" r="1.2"></circle>
                    <circle cx="15" cy="15" r="1.2"></circle>
                    <circle cx="15" cy="9" r="1.2"></circle>
                    <circle cx="9" cy="15" r="1.2"></circle>
                  </svg>
                  <span>Roll</span>
                </button>
                <button id="buyBtn" type="button">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M5 11V7a7 7 0 0 1 14 0v4"></path>
                    <rect x="4" y="10" width="16" height="10" rx="3"></rect>
                    <path d="M12 14v3"></path>
                  </svg>
                  <span>Buy</span>
                </button>
                <button id="upgradeBtn" type="button">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M4 11 12 4l8 7"></path>
                    <path d="M6 10v10h12V10"></path>
                    <path d="M10 20v-5h4v5"></path>
                    <path d="M12 4v5"></path>
                  </svg>
                  <span>Build</span>
                </button>
                <button id="loanBtn" type="button">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="3" y="6" width="18" height="12" rx="3"></rect>
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M6 9v6M18 9v6"></path>
                  </svg>
                  <span>Loan</span>
                </button>
                <button id="repayBtn" type="button">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="m6 12 4 4 8-8"></path>
                    <path d="M4 5h16v14H4z"></path>
                  </svg>
                  <span>Repay</span>
                </button>
                <button id="endBtn" type="button">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M5 12h14"></path>
                    <path d="m13 6 6 6-6 6"></path>
                  </svg>
                  <span>End</span>
                </button>
              </div>
            </div>
          </div>
        </section>

        <aside class="side-rail" aria-label="Game panels">
          <section id="setupPanel" class="panel setup-panel">
            <h2>Table</h2>
            <label class="field">
              <span>Players</span>
              <select id="playerCount">
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4" selected>4</option>
              </select>
            </label>
            <div id="nameFields" class="name-fields"></div>
            <button id="startBtn" class="primary wide" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m8 5 11 7-11 7z"></path>
              </svg>
              <span>Start</span>
            </button>
          </section>

          <section class="panel">
            <h2>Players</h2>
            <div id="playersList" class="players-list"></div>
          </section>

          <section class="panel">
            <h2>Street Deeds</h2>
            <div id="deedsList" class="deeds-list"></div>
          </section>

          <section class="panel">
            <h2>Activity</h2>
            <ol id="logList" class="log-list" aria-live="polite"></ol>
          </section>
        </aside>
      </main>
    </div>

    <div id="cardModal" class="modal" hidden>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="cardTitle">
        <div id="cardType" class="modal-kicker">Card</div>
        <h2 id="cardTitle">Street Card</h2>
        <p id="cardText"></p>
        <button id="cardOkBtn" class="primary wide" type="button">OK</button>
      </div>
    </div>

    <script src="game.js"></script>
  </body>
</html>
