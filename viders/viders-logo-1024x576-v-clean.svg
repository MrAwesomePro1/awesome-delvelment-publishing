<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="576" viewBox="0 0 1024 576" role="img" aria-labelledby="title desc">
  <title id="title">Viders sharp V logo</title>
  <desc id="desc">A 1024 by 576 Viders logo with a cleaner sharper V mark and a refined widescreen presentation.</desc>
  <defs>
    <linearGradient id="bg" x1="96" y1="68" x2="934" y2="510" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050914" />
      <stop offset="0.52" stop-color="#121a35" />
      <stop offset="1" stop-color="#0d132b" />
    </linearGradient>
    <radialGradient id="orange-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(512 168) scale(270 170)">
      <stop offset="0" stop-color="#ff8c42" stop-opacity="0.34" />
      <stop offset="1" stop-color="#ff8c42" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="panel" x1="300" y1="110" x2="716" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff6e33" />
      <stop offset="0.52" stop-color="#ff9547" />
      <stop offset="1" stop-color="#ffc86f" />
    </linearGradient>
    <linearGradient id="panel-gloss" x1="346" y1="132" x2="610" y2="292" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.44" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#000000" flood-opacity="0.36" />
    </filter>
  </defs>

  <rect width="1024" height="576" rx="36" fill="url(#bg)" />
  <rect width="1024" height="576" rx="36" fill="url(#orange-glow)" />

  <g opacity="0.05">
    <path d="M0 96H1024" stroke="#ffffff" />
    <path d="M0 192H1024" stroke="#ffffff" />
    <path d="M0 288H1024" stroke="#ffffff" />
    <path d="M0 384H1024" stroke="#ffffff" />
    <path d="M0 480H1024" stroke="#ffffff" />
    <path d="M128 0V576" stroke="#ffffff" />
    <path d="M256 0V576" stroke="#ffffff" />
    <path d="M384 0V576" stroke="#ffffff" />
    <path d="M512 0V576" stroke="#ffffff" />
    <path d="M640 0V576" stroke="#ffffff" />
    <path d="M768 0V576" stroke="#ffffff" />
    <path d="M896 0V576" stroke="#ffffff" />
  </g>

  <g filter="url(#shadow)">
    <rect x="304" y="104" width="416" height="368" rx="108" fill="url(#panel)" />
    <path
      d="M354 150c42-38 102-58 168-58 44 0 86 9 122 26 35 17 62 42 82 72-45-26-95-38-151-38-84 0-155 24-221 72z"
      fill="url(#panel-gloss)"
    />
    <path
      d="M430 162h63l72 223 71-223h64L587 424h-50z"
      fill="#18223d"
    />
  </g>

  <text
    x="512"
    y="524"
    text-anchor="middle"
    fill="#f7f5ef"
    font-family="Trebuchet MS, Avenir Next, Segoe UI, sans-serif"
    font-size="52"
    font-weight="700"
    letter-spacing="4"
  >
    VIDERS
  </text>
</svg>
