<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="576" viewBox="0 0 1024 576" role="img" aria-labelledby="title desc">
  <title id="title">Viders V only logo</title>
  <desc id="desc">A 1024 by 576 Viders logo featuring only the orange gradient V mark on a cinematic dark background.</desc>
  <defs>
    <linearGradient id="bg" x1="88" y1="72" x2="934" y2="504" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050914" />
      <stop offset="0.55" stop-color="#111833" />
      <stop offset="1" stop-color="#0e1430" />
    </linearGradient>
    <radialGradient id="orange-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(512 288) scale(320 250)">
      <stop offset="0" stop-color="#ff9d4d" stop-opacity="0.55" />
      <stop offset="1" stop-color="#ff9d4d" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="cyan-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(785 420) scale(260 210)">
      <stop offset="0" stop-color="#43d2d1" stop-opacity="0.18" />
      <stop offset="1" stop-color="#43d2d1" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="mark-fill" x1="352" y1="122" x2="676" y2="474" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff6e33" />
      <stop offset="0.56" stop-color="#ff944b" />
      <stop offset="1" stop-color="#ffc86f" />
    </linearGradient>
    <linearGradient id="mark-gloss" x1="380" y1="148" x2="566" y2="286" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.38" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#000000" flood-opacity="0.34" />
    </filter>
  </defs>

  <rect width="1024" height="576" rx="36" fill="url(#bg)" />
  <rect width="1024" height="576" rx="36" fill="url(#orange-glow)" />
  <rect width="1024" height="576" rx="36" fill="url(#cyan-glow)" />

  <g opacity="0.06">
    <path d="M0 96H1024" stroke="#ffffff" />
    <path d="M0 192H1024" stroke="#ffffff" />
    <path d="M0 288H1024" stroke="#ffffff" />
    <path d="M0 384H1024" stroke="#ffffff" />
    <path d="M0 480H1024" stroke="#ffffff" />
    <path d="M128 0V576" stroke="#ffffff" />
    <path d="M256 0V576" stroke="#ffffff" />
    <path d="M384 0V576" stroke="#ffffff" />
    <path d="M512 0V576" stroke="#ffffff" />
    <path d="M640 0V576" stroke="#ffffff" />
    <path d="M768 0V576" stroke="#ffffff" />
    <path d="M896 0V576" stroke="#ffffff" />
  </g>

  <g filter="url(#shadow)">
    <rect x="304" y="96" width="416" height="416" rx="116" fill="url(#mark-fill)" />
    <path
      d="M364 152c41-48 106-74 175-74 44 0 84 11 120 30 34 19 59 48 76 81-44-32-102-50-167-50-78 0-144 24-204 73z"
      fill="url(#mark-gloss)"
    />
    <path
      d="M0 0h61l38 170L138 0h58l-67 228H68z"
      transform="translate(417 166) scale(1.52)"
      fill="#18223d"
    />
  </g>
