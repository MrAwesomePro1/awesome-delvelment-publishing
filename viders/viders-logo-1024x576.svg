<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="576" viewBox="0 0 1024 576" role="img" aria-labelledby="title desc">
  <title id="title">Viders 1024 x 576 logo</title>
  <desc id="desc">A widescreen Viders logo with a bold orange gradient mark, large Viders wordmark, and cinematic dark background.</desc>
  <defs>
    <linearGradient id="bg-gradient" x1="96" y1="60" x2="912" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050914" />
      <stop offset="0.55" stop-color="#111833" />
      <stop offset="1" stop-color="#0e1430" />
    </linearGradient>
    <radialGradient id="glow-orange" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(190 130) rotate(15) scale(220 180)">
      <stop offset="0" stop-color="#ff8c42" stop-opacity="0.5" />
      <stop offset="1" stop-color="#ff8c42" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow-cyan" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(860 470) rotate(-12) scale(260 210)">
      <stop offset="0" stop-color="#43d2d1" stop-opacity="0.28" />
      <stop offset="1" stop-color="#43d2d1" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="mark-fill" x1="180" y1="136" x2="388" y2="404" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff6e33" />
      <stop offset="0.56" stop-color="#ff944b" />
      <stop offset="1" stop-color="#ffc86f" />
    </linearGradient>
    <linearGradient id="mark-gloss" x1="200" y1="150" x2="334" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.42" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <filter id="card-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#000000" flood-opacity="0.38" />
    </filter>
  </defs>

  <rect width="1024" height="576" rx="36" fill="url(#bg-gradient)" />
  <rect width="1024" height="576" rx="36" fill="url(#glow-orange)" />
  <rect width="1024" height="576" rx="36" fill="url(#glow-cyan)" />

  <g opacity="0.08">
    <path d="M0 96H1024" stroke="#ffffff" />
    <path d="M0 192H1024" stroke="#ffffff" />
    <path d="M0 288H1024" stroke="#ffffff" />
    <path d="M0 384H1024" stroke="#ffffff" />
    <path d="M0 480H1024" stroke="#ffffff" />
    <path d="M128 0V576" stroke="#ffffff" />
    <path d="M256 0V576" stroke="#ffffff" />
    <path d="M384 0V576" stroke="#ffffff" />
    <path d="M512 0V576" stroke="#ffffff" />
    <path d="M640 0V576" stroke="#ffffff" />
    <path d="M768 0V576" stroke="#ffffff" />
    <path d="M896 0V576" stroke="#ffffff" />
  </g>

  <g filter="url(#card-shadow)">
    <rect x="118" y="128" width="300" height="300" rx="86" fill="url(#mark-fill)" />
    <path
      d="M165 170c28-34 74-52 123-52 30 0 59 7 84 22 23 13 40 31 51 54-31-24-73-38-120-38-53 0-97 16-138 50z"
      fill="url(#mark-gloss)"
    />
    <path
      d="M193 172h46l29 128.5L298 172h44l-50.5 174h-46z"
      transform="translate(38 18) scale(1.95)"
      fill="#18223d"
    />
  </g>

  <g>
    <text
      x="466"
      y="218"
      fill="#ffb465"
      font-family="Trebuchet MS, Avenir Next, Segoe UI, sans-serif"
      font-size="28"
      font-weight="700"
      letter-spacing="8"
    >
      STREAM LOUDER
    </text>
    <text
      x="462"
      y="318"
      fill="#f7f5ef"
      font-family="Trebuchet MS, Avenir Next, Segoe UI, sans-serif"
      font-size="144"
      font-weight="700"
      letter-spacing="-6"
    >
      Viders
    </text>
    <text
      x="468"
      y="380"
      fill="#b7bfd9"
      font-family="Gill Sans, Segoe UI, sans-serif"
      font-size="34"
      font-weight="600"
      letter-spacing="1"
    >
